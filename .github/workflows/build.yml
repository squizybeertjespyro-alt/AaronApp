name: Build IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for device (unsigned)
        run: |
          xcodebuild \
            -project AaronApp.xcodeproj \
            -scheme AaronApp \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build \
            build

      - name: Package into IPA
        run: |
          mkdir -p Payload
          cp -r build/AaronApp.app Payload/
          zip -r AaronApp.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AaronApp-IPA
          path: AaronApp.ipa
          retention-days: 30
